<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lap Timer">
<title>Lap Besit Kalkulyatoru</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a40;
    --accent: #ff2d2d;
    --accent2: #ff6b35;
    --green: #00ff88;
    --yellow: #ffd700;
    --text: #e8e8f0;
    --muted: #555570;
    --glow: 0 0 20px rgba(255,45,45,0.4);
    --glow-green: 0 0 20px rgba(0,255,136,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    overflow-x: hidden;
    overscroll-behavior: none;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100svh;
    position: relative;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,45,45,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,45,45,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    height: 100svh;
    max-width: 480px;
    margin: 0 auto;
    width: 100%;
  }

  /* Header */
  .header {
    padding: 16px 20px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 15px;
    letter-spacing: 3px;
    color: var(--accent);
    text-shadow: var(--glow);
  }

  .logo span { color: var(--text); }

  .lap-count-badge {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .lap-count-badge b { color: var(--accent); }

  /* Timer section */
  .timer-section {
    padding: 20px;
    text-align: center;
    flex-shrink: 0;
  }

  .timer-label {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .timer-display {
    font-family: 'Orbitron', monospace;
    font-size: clamp(48px, 15vw, 72px);
    font-weight: 900;
    letter-spacing: -2px;
    line-height: 1;
    color: var(--text);
    transition: color 0.2s;
    text-shadow: 0 0 30px rgba(232,232,240,0.2);
  }

  .timer-display.running {
    color: var(--green);
    text-shadow: var(--glow-green);
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.85; }
  }

  .timer-ms {
    font-size: 0.45em;
    color: var(--muted);
    vertical-align: super;
    font-weight: 400;
  }

  /* Lap time display */
  .lap-time-row {
    display: flex;
    gap: 12px;
    margin-top: 14px;
    justify-content: center;
  }

  .mini-timer {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 14px;
    text-align: center;
    min-width: 120px;
  }

  .mini-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 2px;
  }

  .mini-value {
    font-family: 'Orbitron', monospace;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -1px;
  }

  .mini-value.best { color: var(--green); }
  .mini-value.last { color: var(--yellow); }

  /* Controls */
  .controls {
    padding: 0 20px 16px;
    display: flex;
    gap: 12px;
    flex-shrink: 0;
  }

  .btn {
    flex: 1;
    height: 64px;
    border: none;
    border-radius: 14px;
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.15s ease;
    position: relative;
    overflow: hidden;
    text-transform: uppercase;
    -webkit-user-select: none;
    user-select: none;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.1s;
  }

  .btn:active::after { background: rgba(255,255,255,0.1); }

  .btn-start {
    background: linear-gradient(135deg, #00cc66, #00ff88);
    color: #001a0d;
    box-shadow: 0 4px 24px rgba(0,255,136,0.35);
    flex: 1.5;
  }

  .btn-start:active { transform: scale(0.97); }

  .btn-stop {
    background: linear-gradient(135deg, #cc2200, #ff2d2d);
    color: white;
    box-shadow: 0 4px 24px rgba(255,45,45,0.35);
    flex: 1.5;
  }

  .btn-stop:active { transform: scale(0.97); }

  .btn-lap {
    background: var(--card);
    color: var(--yellow);
    border: 1px solid var(--yellow);
    box-shadow: 0 4px 16px rgba(255,215,0,0.15);
  }

  .btn-lap:disabled {
    color: var(--muted);
    border-color: var(--border);
    box-shadow: none;
  }

  .btn-lap:not(:disabled):active { transform: scale(0.97); }

  .btn-reset {
    background: var(--card);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-reset:active { transform: scale(0.97); }

  /* Stats bar */
  .stats-bar {
    margin: 0 20px 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 16px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    flex-shrink: 0;
  }

  .stat-item { text-align: center; }

  .stat-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    display: block;
  }

  .stat-value {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 700;
    margin-top: 2px;
    display: block;
  }

  /* Lap list */
  .laps-section {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .laps-header {
    padding: 0 20px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .laps-title {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .laps-subtitle {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .laps-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    scroll-behavior: smooth;
  }

  .laps-list::-webkit-scrollbar { width: 3px; }
  .laps-list::-webkit-scrollbar-track { background: transparent; }
  .laps-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .lap-item {
    display: grid;
    grid-template-columns: 40px 1fr auto auto;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    animation: slideIn 0.2s ease;
    transition: border-color 0.3s;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .lap-item.best-lap {
    border-color: var(--green);
    background: rgba(0,255,136,0.05);
  }

  .lap-item.worst-lap {
    border-color: rgba(255,45,45,0.4);
  }

  .lap-num {
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
  }

  .lap-bar-wrap {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .lap-bar {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  .best-lap .lap-bar { background: var(--green); }
  .worst-lap .lap-bar { background: var(--accent); }
  .lap-item:not(.best-lap):not(.worst-lap) .lap-bar { background: var(--yellow); }

  .lap-time {
    font-family: 'Orbitron', monospace;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.5px;
    white-space: nowrap;
  }

  .best-lap .lap-time { color: var(--green); }
  .worst-lap .lap-time { color: var(--accent); }

  .lap-badge {
    font-size: 9px;
    letter-spacing: 1px;
    padding: 2px 7px;
    border-radius: 10px;
    white-space: nowrap;
    font-weight: 700;
  }

  .badge-best { background: rgba(0,255,136,0.15); color: var(--green); }
  .badge-worst { background: rgba(255,45,45,0.15); color: var(--accent); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 1px;
    line-height: 1.8;
  }

  .empty-icon {
    font-size: 40px;
    margin-bottom: 12px;
    opacity: 0.5;
    display: block;
  }

  /* Separator line */
  .sep {
    height: 1px;
    background: var(--border);
    margin: 0 20px 12px;
    flex-shrink: 0;
  }

  /* Install hint */
  .install-hint {
    padding: 8px 20px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-align: center;
    flex-shrink: 0;
    border-top: 1px solid var(--border);
  }

  .install-hint span { color: var(--accent2); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">LAP<span>TIMER</span></div>
    <div class="lap-count-badge">LAP <b id="totalLaps">0</b></div>
  </div>

  <div class="timer-section">
    <div class="timer-label">ÜMUMI VAXT</div>
    <div class="timer-display" id="mainTimer">00:00<span class="timer-ms">.000</span></div>

    <div class="lap-time-row">
      <div class="mini-timer">
        <div class="mini-label">🏆 ƏN YAXŞI LAP</div>
        <div class="mini-value best" id="bestLap">--:--.---</div>
      </div>
      <div class="mini-timer">
        <div class="mini-label">⏱ SON LAP</div>
        <div class="mini-value last" id="lastLap">--:--.---</div>
      </div>
    </div>
  </div>

  <div class="controls" id="controls">
    <button class="btn btn-start" id="startBtn" onclick="startStop()">▶ BAŞLA</button>
    <button class="btn btn-reset" id="resetBtn" onclick="resetTimer()">↺</button>
  </div>

  <div class="stats-bar" id="statsBar" style="display:none">
    <div class="stat-item">
      <span class="stat-label">ORTALAMA</span>
      <span class="stat-value" id="avgTime" style="color:#8888aa">--:--.--</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">ƏN YAXŞI</span>
      <span class="stat-value" id="statBest" style="color:var(--green)">--:--.--</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">ƏN PIS</span>
      <span class="stat-value" id="statWorst" style="color:var(--accent)">--:--.--</span>
    </div>
  </div>

  <div class="sep"></div>

  <div class="laps-section">
    <div class="laps-header">
      <span class="laps-title">LAP TARİXÇƏSİ</span>
      <span class="laps-subtitle" id="lapSubtitle"></span>
    </div>
    <div class="laps-list" id="lapsList">
      <div class="empty-state">
        <span class="empty-icon">🏎️</span>
        Taymeri başladın və<br>lap düyməsinə basın
      </div>
    </div>
  </div>

  <div class="install-hint">
    Android: Brauzer menyusu → <span>Ana ekrana əlavə et</span> 📲
  </div>
</div>

<script>
  let startTime = 0;
  let elapsed = 0;
  let lapStart = 0;
  let running = false;
  let animFrame = null;
  let laps = [];

  function fmt(ms) {
    const m = Math.floor(ms / 60000);
    const s = Math.floor((ms % 60000) / 1000);
    const ms3 = ms % 1000;
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(ms3).padStart(3,'0')}`;
  }

  function fmtShort(ms) {
    const m = Math.floor(ms / 60000);
    const s = Math.floor((ms % 60000) / 1000);
    const ms2 = Math.floor((ms % 1000) / 10);
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(ms2).padStart(2,'0')}`;
  }

  function renderTimer() {
    const now = elapsed + (running ? Date.now() - startTime : 0);
    const m = Math.floor(now / 60000);
    const s = Math.floor((now % 60000) / 1000);
    const ms = now % 1000;

    document.getElementById('mainTimer').innerHTML =
      `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}<span class="timer-ms">.${String(ms).padStart(3,'0')}</span>`;

    if (running) animFrame = requestAnimationFrame(renderTimer);
  }

  function startStop() {
    if (!running) {
      // Start
      startTime = Date.now();
      if (laps.length === 0) lapStart = Date.now();
      running = true;
      document.getElementById('mainTimer').classList.add('running');

      // Update controls
      document.getElementById('controls').innerHTML = `
        <button class="btn btn-stop" onclick="startStop()">⏸ DAYANDUR</button>
        <button class="btn btn-lap" id="lapBtn" onclick="recordLap()">⊕ LAP</button>
        <button class="btn btn-reset" onclick="resetTimer()">↺</button>
      `;

      renderTimer();
    } else {
      // Stop
      elapsed += Date.now() - startTime;
      running = false;
      document.getElementById('mainTimer').classList.remove('running');
      cancelAnimationFrame(animFrame);

      document.getElementById('controls').innerHTML = `
        <button class="btn btn-start" onclick="startStop()">▶ DAVAM ET</button>
        <button class="btn btn-lap" onclick="recordLap()">⊕ LAP</button>
        <button class="btn btn-reset" onclick="resetTimer()">↺</button>
      `;
    }
  }

  function recordLap() {
    if (!running) return;
    const now = Date.now();
    const lapTime = now - lapStart;
    lapStart = now;
    laps.unshift(lapTime); // newest first
    document.getElementById('totalLaps').textContent = laps.length;
    document.getElementById('lastLap').textContent = fmtShort(lapTime);
    updateBest();
    renderLaps();
    updateStats();
  }

  function updateBest() {
    if (laps.length === 0) return;
    const best = Math.min(...laps);
    document.getElementById('bestLap').textContent = fmtShort(best);
  }

  function updateStats() {
    if (laps.length === 0) return;
    const best = Math.min(...laps);
    const worst = Math.max(...laps);
    const avg = laps.reduce((a,b) => a+b, 0) / laps.length;
    document.getElementById('statsBar').style.display = 'grid';
    document.getElementById('avgTime').textContent = fmtShort(avg);
    document.getElementById('statBest').textContent = fmtShort(best);
    document.getElementById('statWorst').textContent = fmtShort(worst);
    document.getElementById('lapSubtitle').textContent = `${laps.length} lap · ${fmtShort(laps.reduce((a,b)=>a+b,0))} ümumi`;
  }

  function renderLaps() {
    const list = document.getElementById('lapsList');
    if (laps.length === 0) {
      list.innerHTML = '<div class="empty-state"><span class="empty-icon">🏎️</span>Taymeri başladın ve<br>lap düyməsinə basın</div>';
      return;
    }
    const best = Math.min(...laps);
    const worst = Math.max(...laps);
    const maxTime = worst;

    list.innerHTML = laps.map((t, i) => {
      const lapNum = laps.length - i; // actual lap number (newest = highest)
      const isBest = t === best && laps.length > 1;
      const isWorst = t === worst && laps.length > 1;
      const barWidth = Math.max(10, (t / maxTime) * 100);
      const cls = isBest ? 'best-lap' : isWorst ? 'worst-lap' : '';
      const badge = isBest
        ? '<span class="lap-badge badge-best">BEST</span>'
        : isWorst
        ? '<span class="lap-badge badge-worst">SLOW</span>'
        : '';
      return `
        <div class="lap-item ${cls}">
          <span class="lap-num">#${String(lapNum).padStart(2,'0')}</span>
          <div class="lap-bar-wrap"><div class="lap-bar" style="width:${barWidth}%"></div></div>
          <span class="lap-time">${fmt(t)}</span>
          ${badge}
        </div>
      `;
    }).join('');
  }

  function resetTimer() {
    running = false;
    cancelAnimationFrame(animFrame);
    elapsed = 0;
    startTime = 0;
    lapStart = 0;
    laps = [];

    document.getElementById('mainTimer').innerHTML = '00:00<span class="timer-ms">.000</span>';
    document.getElementById('mainTimer').classList.remove('running');
    document.getElementById('bestLap').textContent = '--:--.---';
    document.getElementById('lastLap').textContent = '--:--.---';
    document.getElementById('totalLaps').textContent = '0';
    document.getElementById('statsBar').style.display = 'none';
    document.getElementById('lapSubtitle').textContent = '';

    document.getElementById('controls').innerHTML = `
      <button class="btn btn-start" id="startBtn" onclick="startStop()">▶ BAŞLA</button>
      <button class="btn btn-reset" onclick="resetTimer()">↺</button>
    `;

    renderLaps();
  }

  // Prevent sleep on mobile (Screen Wake Lock API)
  async function requestWakeLock() {
    try {
      if ('wakeLock' in navigator) {
        await navigator.wakeLock.request('screen');
      }
    } catch {}
  }
  requestWakeLock();

  // Re-request on visibility change
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') requestWakeLock();
  });
</script>
</body>
</html>
